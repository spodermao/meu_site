<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casamento · Gui &amp; Ana</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== DESIGN SYSTEM MINIMALISTA (BLACK, WHITE & BEIGE) ===== */
:root{
  --bg-light:#F9F6F0;
  --bg-white:#FFFFFF;
  --accent-beige:#E3DDD3;
  --dark-charcoal:#111111;
  --text-muted:#666666;
  --border:rgba(17,17,17,0.08);
  --font-serif:'Cormorant Garamond',serif;
  --font-sans:'Lato',sans-serif;
  --sp-xs:4px; --sp-sm:8px; --sp-md:16px; --sp-lg:24px; --sp-xl:40px; --sp-2xl:64px;
  --r-sm:2px; --r-md:4px; --r-lg:8px; --r-full:999px;
  --shadow-sm:0 2px 12px rgba(0,0,0,.03);
  --shadow-md:0 12px 32px rgba(0,0,0,.06);
  --t:all .22s cubic-bezier(0.25, 1, 0.5, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg-light);color:var(--dark-charcoal);font-size:14px;line-height:1.65;letter-spacing:0.02em}
img{max-width:100%;display:block}
button{cursor:pointer;font-family:var(--font-sans);border:none;outline:none;background:none}
input,select,textarea{font-family:var(--font-sans);font-size:14px;width:100%;border:1px solid var(--accent-beige);border-radius:var(--r-sm);padding:11px 14px;background:var(--bg-white);color:var(--dark-charcoal);box-sizing:border-box;transition:var(--t);letter-spacing:0.04em}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--dark-charcoal);box-shadow:0 0 0 3px rgba(17,17,17,.04)}
label{display:block;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dark-charcoal);margin-bottom:6px;font-weight:700}
.fg{margin-bottom:16px}

/* NAV EDITORIAL */
nav{background:rgba(249,246,240,.96);border-bottom:1px solid var(--border);padding:0 var(--sp-lg);height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.logo{font-family:var(--font-serif);font-size:1.4rem;color:var(--dark-charcoal);letter-spacing:0.05em;white-space:nowrap}
.nav-links{display:flex;gap:4px}
.nl{padding:8px 14px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);border-radius:var(--r-sm);transition:var(--t);font-weight:400}
.nl:hover{color:var(--dark-charcoal);background:rgba(17,17,17,0.03)}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-adm{border:1px solid var(--dark-charcoal);color:var(--dark-charcoal);padding:6px 14px;border-radius:var(--r-sm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:var(--t);white-space:nowrap}
.btn-adm:hover,.btn-adm.active{background:var(--dark-charcoal);color:var(--bg-white)}
.hamburger{display:none;flex-direction:column;gap:5px;padding:6px;border-radius:var(--r-sm)}
.hamburger span{display:block;width:18px;height:1.5px;background:var(--dark-charcoal);transition:var(--t)}
.mobile-menu{display:none;position:fixed;inset:0;top:64px;background:var(--bg-light);z-index:99;padding:var(--sp-lg);flex-direction:column;gap:8px}
.mobile-menu.open{display:flex}
.mobile-menu .nl{font-size:0.9rem;padding:14px 20px;border-radius:var(--r-sm);border:1px solid var(--border);color:var(--dark-charcoal);background:var(--bg-white)}

/* ADMIN BAR */
.admin-bar{display:none;background:var(--dark-charcoal);color:#fff;text-align:center;padding:8px var(--sp-lg);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.admin-bar.show{display:flex;align-items:center;justify-content:center;gap:var(--sp-md)}
.admin-bar button{color:#fff;font-size:11px;letter-spacing:.1em;text-transform:uppercase;text-decoration:underline;background:none;border:none;cursor:pointer}

/* HERO MINIMALISTA */
.hero{min-height:92vh;background:linear-gradient(180deg, var(--accent-beige) 0%, var(--bg-light) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px var(--sp-lg) 60px;position:relative;overflow:hidden}
.hero-tag{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--dark-charcoal);border:1px solid var(--dark-charcoal);padding:6px 20px;border-radius:var(--r-full);display:inline-block;margin-bottom:24px;font-weight:700}
.hero h1{font-family:var(--font-serif);font-size:clamp(3rem,9vw,6rem);font-weight:300;color:var(--dark-charcoal);line-height:1.1;margin-bottom:12px;letter-spacing:0.03em}
.hero p{font-size:14px;color:var(--text-muted);max-width:520px;line-height:1.8;margin:0 auto 2.5rem;letter-spacing:0.03em}
.photo-wrap{width:150px;height:140px;border-radius:var(--r-full);background:rgba(17,17,17,0.03);overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-family:var(--font-serif);font-size:2.5rem;color:var(--dark-charcoal);opacity:.8;cursor:pointer;position:relative;transition:var(--t)}
.photo-wrap:hover{opacity:1;transform:scale(1.02)}
.photo-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.sep{display:flex;align-items:center;gap:16px;margin:20px auto;width:fit-content}
.sep-line{width:60px;height:1px;background:var(--dark-charcoal);opacity:0.2}
.scroll-hint{position:absolute;bottom:2.5rem;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted)}
.scroll-line{width:1px;height:40px;background:var(--dark-charcoal);opacity:0.4;animation:sl 2s ease-in-out infinite}
@keyframes sl{0%,100%{transform:scaleY(0.3);transform-origin:top;opacity:0.2}50%{transform:scaleY(1);transform-origin:top;opacity:1}}

/* COUNTDOWN BLOCK */
.cd-sec{background:var(--dark-charcoal);color:var(--bg-light);padding:5rem var(--sp-lg);text-align:center}
.cd-lbl{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent-beige);margin-bottom:2.5rem;font-weight:700}
.cd-grid{display:flex;justify-content:center;gap:clamp(2rem,6vw,4rem);flex-wrap:wrap}
.cd-item{text-align:center;min-width:70px}
.cd-num{font-family:var(--font-serif);font-size:clamp(2.8rem,7vw,4.5rem);font-weight:300;color:var(--bg-white);line-height:1;letter-spacing:0.02em}
.cd-unit{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-beige);margin-top:8px}

/* SECTIONS BRANCAS CLASSICAS */
.sec{padding:var(--sp-2xl) var(--sp-lg);max-width:960px;margin:0 auto}
.sec-head{text-align:center;margin-bottom:3.5rem}
.sec-tag{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.sec-title{font-family:var(--font-serif);font-size:clamp(2rem,5vw,3rem);font-weight:300;color:var(--dark-charcoal);margin-top:8px;letter-spacing:0.02em}

/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.info-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-sm);padding:32px var(--sp-md);text-align:center;box-shadow:var(--shadow-sm);transition:var(--t)}
.info-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.info-card h3{font-family:var(--font-serif);font-size:1.3rem;color:var(--dark-charcoal);margin:12px 0 6px;font-weight:400}
.info-card p{font-size:13px;color:var(--text-muted);line-height:1.6}
.info-detail{font-size:11px;color:var(--dark-charcoal);margin-top:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.map-wrap{margin-top:var(--sp-lg);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.map-wrap iframe{display:block;width:100%;height:450px;border:none}

/* SPOTIFY BLOCK */
.spotify-sec{background:var(--dark-charcoal);padding:5rem var(--sp-lg);text-align:center}
.spotify-inner{max-width:680px;margin:0 auto}
.spotify-lbl{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent-beige);margin-bottom:8px;font-weight:700}
.spotify-title{font-family:var(--font-serif);font-size:clamp(1.8rem,4vw,2.5rem);font-weight:300;color:var(--bg-white);margin-bottom:28px;letter-spacing:0.02em}
.spotify-wrap{border-radius:0px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.spotify-wrap iframe{display:block;width:100%;border:none;border-radius:0px}

/* RSVP BOX */
.rsvp-bg{background:var(--accent-beige);padding:var(--sp-2xl) var(--sp-lg)}
.rsvp-inner{max-width:560px;margin:0 auto}
.rsvp-box{background:var(--bg-white);border-radius:var(--r-sm);padding:40px var(--sp-lg);border:1px solid rgba(0,0,0,0.04);box-shadow:var(--shadow-md)}
.btn-main{width:100%;padding:14px;background:var(--dark-charcoal);color:var(--bg-white);border-radius:var(--r-sm);font-size:11px;letter-spacing:.15em;text-transform:uppercase;transition:var(--t);border:none;cursor:pointer;font-weight:700;font-family:var(--font-sans)}
.btn-main:hover{background:#333333;transform:translateY(-1px)}
.rsvp-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.tag-y{color:var(--dark-charcoal);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
.tag-n{color:var(--text-muted);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0}
.csv-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.btn-csv{flex:1;min-width:160px;padding:12px;background:var(--dark-charcoal);color:#fff;border:none;border-radius:var(--r-sm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;gap:6px}

/* GIFTS & FILTER PANEL */
.gifts-wrap{padding:var(--sp-2xl) var(--sp-lg);max-width:1100px;margin:0 auto}
.filter-panel{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--sp-md) var(--sp-lg);margin-bottom:var(--sp-lg);box-shadow:var(--shadow-sm)}
.filter-row{display:flex;align-items:flex-start;gap:var(--sp-md);flex-wrap:wrap;margin-bottom:var(--sp-md)}
.filter-row:last-child{margin-bottom:0}
.filter-row-controls{border-top:1px solid var(--border);padding-top:var(--sp-md)}
.filter-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--dark-charcoal);font-weight:700;margin-bottom:8px;display:block;white-space:nowrap;padding-top:6px}
.filter-group{display:flex;flex-direction:column;flex:1;min-width:160px}
.fbar{display:flex;gap:6px;flex-wrap:wrap}
.filt{background:none;border:1px solid var(--accent-beige);color:var(--text-muted);padding:6px 16px;border-radius:var(--r-full);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:var(--t);font-family:var(--font-sans)}
.filt.on,.filt:hover{background:var(--dark-charcoal);color:var(--bg-white);border-color:var(--dark-charcoal)}
.price-filter-wrap{display:flex;flex-direction:column;gap:4px}
.price-slider{width:100%;-webkit-appearance:none;appearance:none;height:2px;background:linear-gradient(to right,var(--dark-charcoal) 0%,var(--dark-charcoal) var(--pct,100%),var(--accent-beige) var(--pct,100%));outline:none;cursor:pointer;border:none;padding:0}
.price-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--dark-charcoal);cursor:pointer;border:2px solid var(--bg-white);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.price-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--dark-charcoal);border:2px solid var(--bg-white)}
.price-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.sort-select{font-size:12px;padding:8px 12px;border-radius:var(--r-sm);border:1px solid var(--accent-beige);background:var(--bg-white);cursor:pointer;width:100%}
.filter-results{font-size:11px;color:var(--text-muted);margin-top:6px;letter-spacing:.05em}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-muted);font-size:13px}

/* GIFT CARD */
.gcard{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;transition:var(--t);position:relative;display:flex;flex-direction:column;box-shadow:var(--shadow-sm)}
.gcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.gcard.done{opacity:.5}
.gimg-wrap{width:100%;height:220px;background:var(--bg-white);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;padding:12px;box-sizing:border-box;border-bottom:1px solid rgba(17,17,17,0.03)}
.gimg-wrap img{width:100%;height:100%;object-fit:contain;background:var(--bg-white)}
.gbadge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:0px;background:var(--dark-charcoal);color:var(--bg-white)}
.b-q{background:var(--dark-charcoal);color:#fff}
.b-u{background:rgba(17,17,17,0.05);color:var(--dark-charcoal);border:1px solid var(--dark-charcoal)}
.b-d{background:var(--accent-beige);color:var(--dark-charcoal)}
.gbody{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:6px}
.gcat{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.gtitle{font-family:var(--font-serif);font-size:1.25rem;color:var(--dark-charcoal);line-height:1.3;font-weight:400}
.gdesc{font-size:12px;color:var(--text-muted);line-height:1.6;flex:1;margin-bottom:6px}
.gprice{font-size:0.95rem;font-weight:700;color:var(--dark-charcoal);font-family:var(--font-sans);letter-spacing:0.02em}
.qinfo{font-size:11px;color:var(--text-muted);letter-spacing:0.02em}
.qbar{background:var(--bg-light);border-radius:var(--r-full);height:3px;overflow:hidden;margin:4px 0 10px}
.qfill{background:var(--dark-charcoal);height:100%}
.glinks{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.glink{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--accent-beige);border-radius:var(--r-sm);font-size:11px;color:var(--dark-charcoal);transition:var(--t);cursor:pointer;text-align:left;width:100%}
.glink:hover{background:var(--bg-light);border-color:var(--dark-charcoal)}
.btn-res{width:100%;padding:11px;background:var(--dark-charcoal);color:var(--bg-white);border-radius:var(--r-sm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:var(--t);margin-top:auto;cursor:pointer;border:none;font-weight:700}
.btn-res:hover:not([disabled]){background:#333333}
.btn-res[disabled], .btn-q[disabled]{background:#cccccc;cursor:not-allowed;color:#888888}
.btn-q{width:100%;padding:11px;background:var(--bg-light);color:var(--dark-charcoal);border:1px solid var(--dark-charcoal);border-radius:var(--r-sm);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-top:auto;cursor:pointer;border:none;transition:var(--t);font-weight:700}
.btn-q:hover:not([disabled]){background:var(--dark-charcoal);color:var(--bg-white)}

/* FOOTER */
footer{background:var(--dark-charcoal);color:var(--accent-beige);text-align:center;padding:3.5rem var(--sp-lg);border-top:1px solid rgba(255,255,255,0.05)}
.fn{font-family:var(--font-serif);font-size:1.6rem;color:var(--bg-white);margin-bottom:6px;letter-spacing:0.04em}
footer small{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;opacity:.5}

/* OVERLAYS & MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-start;justify-content:center;padding:var(--sp-md);overflow-y:auto;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.panel{background:var(--bg-light);border-radius:var(--r-sm);padding:var(--sp-lg) 32px;width:100%;max-width:500px;position:relative;margin:auto;box-shadow:0 30px 70px rgba(0,0,0,.35)}
.panel h2{font-family:var(--font-serif);font-size:1.8rem;color:var(--dark-charcoal);margin-bottom:20px;font-weight:300;letter-spacing:0.02em}
.x{position:absolute;top:16px;right:20px;font-size:1.8rem;color:var(--text-muted);cursor:pointer;line-height:1;transition:var(--t)}
.x:hover{color:var(--dark-charcoal)}
.tabs{display:flex;border-bottom:1px solid var(--accent-beige);margin-bottom:20px}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 16px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:-1px;cursor:pointer;transition:var(--t)}
.tab.on{color:var(--dark-charcoal);border-bottom-color:var(--dark-charcoal);font-weight:700}
.radrow{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.ro{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.ro input{width:auto;accent-color:var(--dark-charcoal)}
.ai{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.bdel{background:none;border:1px solid var(--dark-charcoal);color:var(--dark-charcoal);padding:4px 12px;border-radius:var(--r-sm);font-size:11px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:var(--t)}
.bdel:hover{background:var(--dark-charcoal);color:#fff}
.cond{display:none}
.cond.v{display:block}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:flex-start;justify-content:center;padding:var(--sp-md);overflow-y:auto;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal{background:var(--bg-light);border-radius:var(--r-sm);padding:32px 24px;width:100%;max-width:440px;position:relative;margin:auto;box-shadow:0 30px 70px rgba(0,0,0,.4)}
.modal h3{font-family:var(--font-serif);font-size:1.5rem;color:var(--dark-charcoal);margin-bottom:14px;font-weight:300}
.modal-img{width:100%;height:220px;object-fit:contain;border-radius:var(--r-sm);margin-bottom:14px;background:#fff;padding:12px;box-sizing:border-box;border:1px solid var(--border)}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.qbtn{background:var(--dark-charcoal);color:#fff;border:none;width:30px;height:30px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--t)}
.qbtn:hover{background:#333333}
.qval{font-size:1.2rem;font-weight:700;color:var(--dark-charcoal);min-width:2rem;text-align:center}

/* LOAD ZONE */
.upload-zone{border:1px dashed var(--dark-charcoal);border-radius:var(--r-sm);padding:16px;background:var(--bg-white);margin-bottom:8px;transition:var(--t)}
.frow{display:flex;gap:8px;align-items:center}
.frow input{flex:1;margin:0}
.fbtn{padding:9px 14px;background:var(--dark-charcoal);color:#fff;border:none;border-radius:var(--r-sm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:var(--t)}
.fbtn:hover{background:#333333}
.pbox{display:none;margin-top:8px;padding:12px;background:var(--accent-beige);border-radius:var(--r-sm);align-items:center;gap:12px}
.pbox.v{display:flex}
.pimg{width:48px;height:48px;object-fit:contain;border-radius:var(--r-sm);flex-shrink:0;background:#fff}
.pinfo{flex:1;min-width:0}
.ptit{font-size:12px;color:var(--dark-charcoal);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pprc{font-size:11px;color:var(--dark-charcoal);margin-top:2px;font-weight:700}
.buse{padding:6px 12px;background:var(--dark-charcoal);color:#fff;border:none;border-radius:var(--r-sm);font-size:11px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:var(--t)}
.ferr{font-size:11px;color:var(--dark-charcoal);font-weight:700;margin-top:6px;display:none}
.ferr.v{display:block}
.prev-img-wrap{position:relative;width:fit-content;margin-bottom:12px;display:none}
.prev-img-wrap img{height:100px;max-width:220px;object-fit:contain;border-radius:var(--r-sm);border:1px solid var(--accent-beige)}
.prev-img-x{position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:var(--dark-charcoal);color:#fff;font-size:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.or-divider{display:flex;align-items:center;gap:12px;margin:12px 0}
.or-divider span{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--text-muted);white-space:nowrap}

    _sliderBound=true;
    sl.addEventListener('input',function(){
      var v=parseFloat(this.value),m=parseFloat(this.max)||1;
      this.style.setProperty('--pct',Math.round(v/m*100)+'%');
      gState.maxPrice=(v>=m)?Infinity:v;
      updatePriceLabel(); renderGifts();
    });
  }
}

function updatePriceLabel(){
  var sl=W.$('priceRange'),v=parseFloat(sl.value),lbl=W.$('priceRangeVal');
  if(!sl || !lbl) return;
  if(v>=parseFloat(sl.max)){ lbl.textContent='Todos'; }
  else{ lbl.textContent='Até R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:0}); }
}

W.setFilter = function(f){ gState.cat=f; renderFilters(); renderGifts(); };
W.setStatus = function(s,btn){
  gState.status=s;
  W.$('sGifts').querySelectorAll('[data-s]').forEach(function(b){ b.classList.toggle('on',b===btn); });
  renderGifts();
};

function renderFilters(){
  var bar=W.$('fBar'),cs=cats();
  if(!bar) return;
  var h='<button class="filt'+(gState.cat==='todos'?' on':'')+'" id="filtAll">Todas as Opções</button>';
  cs.forEach(function(cat){ h+='<button class="filt'+(gState.cat===cat?' on':'')+'" data-f="'+esc(cat)+'">'+esc(cat)+'</button>'; });
  bar.innerHTML=h;
  bar.querySelectorAll('.filt').forEach(function(b){ b.addEventListener('click',function(){ W.setFilter(b.dataset.f||'todos'); }); });
}

function gCard(g){
  if(!g) return '';
  var done=g.type!=='quota'&&g.reservedBy;
  var imgH=g.img ?'<div class="gimg-wrap"><img src="'+esc(g.img)+'" alt="'+esc(g.title)+'" loading="lazy" onerror="this.parentElement.innerHTML=\'🎁\'"></div>':'<div class="gimg-wrap">🎁</div>';
  var badge=g.type==='quota'?'<div class="gbadge b-q">Cotas</div>':g.type==='url'?'<div class="gbadge b-u">Comprar online</div>':done?'<div class="gbadge b-d">Reservado</div>':'';
  var prH=g.price?'<div class="gprice">R$ '+fmt(g.price)+'</div>':'';
  var ctH=g.cat?'<div class="gcat">'+esc(g.cat)+'</div>':'';
  var dcH=g.desc?'<div class="gdesc">'+esc(g.desc).replace(/\n/g,'<br>')+'</div>':'';
  var ex='';
  if(g.type==='quota'){
    var tk=g.taken||0,tot=g.qtot||1,pct=Math.round(tk/tot*100);
    ex='<div class="qinfo">'+tk+' de '+tot+' cotas reservadas</div><div class="qbar"><div class="qfill" style="width:'+pct+'%"></div></div><button class="btn-q" data-gid="'+g.id+'" '+(tk>=tot?'disabled':'')+'>'+( tk>=tot?'Esgotado':'Reservar cotas')+'</button>';
  } else if(g.type==='url'){
    var lks='';
    if(g.url1)lks+='<button class="glink" data-url="'+esc(g.url1)+'"><span style="flex:1;text-align:left">'+esc(g.lbl1||'Loja 1')+'</span><span>→</span></button>';
    if(g.url2)lks+='<button class="glink" data-url="'+esc(g.url2)+'"><span style="flex:1;text-align:left">'+esc(g.lbl2||'Loja 2')+'</span><span>→</span></button>';
    ex=(lks?'<div class="glinks">'+lks+'</div>':'')+'<button class="btn-res" data-gid="'+g.id+'" '+(done?'disabled':'')+'>'+( done?'Marcado ✓':'Marcar como comprado')+'</button>';
  } else {
    ex='<button class="btn-res" data-gid="'+g.id+'" '+(done?'disabled':'')+'>'+( done?'Reservado por '+esc(g.reservedBy):'Reservar presente')+'</button>';
  }
  return '<div class="gcard'+(done&&g.type!=='quota'?' done':'')+'">'+imgH+badge+'<div class="gbody">'+ctH+'<div class="gtitle">'+esc(g.title)+'</div>'+dcH+prH+ex+'</div></div>';
}

function renderGifts(){
  var grid=W.$('gGrid');
  if(!grid) return;
  var list=D.gifts.slice();
  if(gState.cat!=='todos') list=list.filter(function(g){ return g && g.cat===gState.cat; });
  if(gState.status==='disponivel') list=list.filter(function(g){ return g && (g.type==='quota'?(g.taken||0)<(g.qtot||1):!g.reservedBy); });
  if(gState.status==='reservado') list=list.filter(function(g){ return g && (g.type==='quota'?(g.taken||0)>0:!!g.reservedBy); });
  if(gState.maxPrice!==Infinity) list=list.filter(function(g){
    if(!g) return false;
    var p=g.price===''||g.price===null||g.price===undefined?null:parseFloat(g.price);
    return p===null||(!isNaN(p)&&p<=gState.maxPrice);
  });
  var sort=W.$('sortOrder').value;
  if(sort==='asc') list.sort(function(a,b){ return (a && b) ? (parseFloat(a.price)||0)-(parseFloat(b.price)||0) : 0; });
  if(sort==='desc') list.sort(function(a,b){ return (a && b) ? (parseFloat(b.price)||0)-(parseFloat(a.price)||0) : 0; });
  var avail=D.gifts.filter(function(g){ return g && (g.type==='quota'?(g.taken||0)<(g.qtot||1):!g.reservedBy); }).length;
  W.$('giftCount').textContent=list.length+' presente'+(list.length!==1?'s':'')+' encontrado'+(list.length!==1?'s':'')+' · '+avail+' disponível'+(avail!==1?'is':'');
  if(!list.length){ grid.innerHTML='<div class="empty">Nenhum presente'+(D.gifts.length?' encontrado com esses filtros.':' ainda.<br><small style="color:var(--text-muted)">Acesse o painel restrito para cadastrar.</small>')+'</div>'; return; }
  grid.innerHTML=list.map(gCard).join('');
  grid.querySelectorAll('[data-gid]').forEach(function(b){ b.addEventListener('click',function(){ openModal(b.dataset.gid); }); });
  grid.querySelectorAll('[data-url]').forEach(function(b){ b.addEventListener('click',function(e){ e.stopPropagation(); window.open(b.dataset.url,'_blank','noopener'); }); });
}

function openModal(id){
  var g=D.gifts.find(function(x){ return x && x.id===id; }); if(!g)return;
  var mb=W.$('mBody');
  var imgH=g.img?'<img src="'+esc(g.img)+'" class="modal-img" onerror="this.style.display=\'none\'">':'';
  var dcH=g.desc?'<p style="font-size:13px;color:var(--text-muted);margin-bottom:10px;line-height:1.65">'+esc(g.desc).replace(/\n/g,'<br>')+'</p>':'';
  var prH=g.price?'<p style="color:var(--dark-charcoal);font-weight:700;margin-bottom:10px;font-size:1rem">R$ '+fmt(g.price)+(g.type==='quota'?' / cota':'')+'</p>':'';
  if(g.type==='quota'){
    var tk=g.taken||0,tot=g.qtot||1,av=tot-tk;
    var qMax=av,qVal=1;
    mb.innerHTML='<h3>'+esc(g.title)+'</h3>'+imgH+dcH+prH+'<p style="font-size:13px;color:var(--text-muted);margin-bottom:10px"><strong>'+av+'</strong> cota(s) disponíveis de '+tot+'</p><div class="fg"><label>Seu nome</label><input id="mN" type="text" placeholder="Como quer ser identificado(a)"></div><div class="qty-row"><button class="qbtn" id="qMinus">-</button><span class="qval" id="qV">1</span><button class="qbtn" id="qPlus">+</button><span style="font-size:12px;color:var(--text-muted)">cota(s)</span></div><button class="btn-main" id="btnResQ">Confirmar reserva</button>';
    W.$('qMinus').addEventListener('click',function(){ qVal=Math.max(1,qVal-1); W.$('qV').textContent=qVal; });
    W.$('qPlus').addEventListener('click',function(){ qVal=Math.min(qMax,qVal+1); W.$('qV').textContent=qVal; });
    W.$('btnResQ').addEventListener('click', async function(){
      var name=W.$('mN').value.trim(); if(!name){ W.toast('Informe seu nome.'); return; }
      g.taken=(g.taken||0)+qVal;
      if(!g.reservations)g.reservations=[];
      g.reservations.push({name:name,qty:qVal,ts:Date.now()});
      await dbUpdateGift(g);
      renderGifts(); W.$('ovModal').classList.remove('open');
      W.toast(qVal+' cota(s) reservada(s)! 🎉');
    });
  } else {
    mb.innerHTML='<h3>'+esc(g.title)+'</h3>'+imgH+dcH+prH+(g.type==='url'?'<p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Após a compra, confirme sua reserva abaixo.</p>':'')+'<div class="fg"><label>Seu nome</label><input id="mN" type="text" placeholder="Como quer ser identificado(a)"></div><button class="btn-main" id="btnResG">Confirmar reserva</button>';
    W.$('btnResG').addEventListener('click', async function(){
      var name=W.$('mN').value.trim(); if(!name){ W.toast('Informe seu nome.'); return; }
      g.reservedBy=name; g.reservedTs=Date.now();
      await dbUpdateGift(g);
      renderGifts(); W.$('ovModal').classList.remove('open');
      W.toast('Presente reservado! 🎉');
    });
  }
  W.$('ovModal').classList.add('open');
  setTimeout(function(){ var el=W.$('mN'); if(el)el.focus(); },80);
}

W.csvGifts = function(){
  var reserved=D.gifts.filter(function(g){ return g && ((g.type==='quota'&&g.taken>0)||(g.type!=='quota'&&g.reservedBy)); });
  if(!reserved.length){ W.toast('Nenhum presente reservado ainda.'); return; }
  var rows=[['Título','Valor','Categoria','Tipo','Pessoa Responsável','Data de Reserva']];
  reserved.forEach(function(g){
    if(g.type==='quota'&&g.reservations&&g.reservations.length){
      g.reservations.forEach(function(r){ rows.push([g.title,g.price?'R$ '+fmt(g.price):'',g.cat||'',g.type,r.name,fmtDate(r.ts)]); });
    } else {
      rows.push([g.title,g.price?'R$ '+fmt(g.price):'',g.cat||'',g.type,g.reservedBy||'',fmtDate(g.reservedTs)]);
    }
  });
  dlCsv(rows,'presentes_reservados.csv');
  W.toast('CSV exportado! ✓');
};

function dlCsv(rows,filename){
  var bom='\uFEFF';
  var csv=bom+rows.map(function(r){ return r.map(function(c){ return '"'+String(c||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
}

function openAdmin(){
  if(!W.adm){ W.$('ovLogin').classList.add('open'); return; }
  var c=D.cfg;
  W.$('cN1').value=c.n1||''; W.$('cN2').value=c.n2||''; W.$('cDate').value=c.date||'';
  W.$('cTime').value=c.time||''; W.$('cVenue').value=c.venue||''; W.$('cAddr').value=c.addr||'';
  W.$('cMap').value=c.mapUrl||''; W.$('cDress').value=c.dress||''; W.$('cMsg').value=c.msg||'';
  W.$('cSpotify').value=c.spotifyUrl||'';
  renderAdminList(); W.aTab('Add');
  W.$('ovAdmin').classList.add('open');
}

W.aTab = function(t){
  ['Add','List','Cfg'].forEach(function(x){
    W.$('t'+x).classList.toggle('on',x===t);
    W.$('p'+x).style.display=x===t?'block':'none';
  });
  if(t==='List') renderAdminList();
};

W.togType = function(){
  var t=document.querySelector('input[name="gt"]:checked').value;
  W.$('cUrl').classList.toggle('v',t==='url');
  W.$('cQuota').classList.toggle('v',t==='quota');
};

function doFetch(url,slot,btnId,pvId,errId,imgId,titId,prcId){
  if(!url){ W.toast('Cole um link primeiro.'); return; }
  var btn=W.$(btnId); btn.textContent='…'; btn.disabled=true;
  W.$(pvId).classList.remove('v'); W.$(errId).classList.remove('v');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:'Acesse esta URL e extraia dados do produto. Responda SOMENTE com JSON puro sem texto extra:\n{"title":"nome do produto","price":"preco numerico ex 149.90","image":"url direta da imagem","store":"nome da loja"}\nSe nao encontrar use null. URL: '+url}]
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    var text=(data.content||[]).filter(function(b){ return b.type==='text'; }).map(function(b){ return b.text; }).join('');
    var m=text.match(/\{[\s\S]*?\}/); if(!m) throw new Error();
    var j=JSON.parse(m[0]); prev[slot]=j;
    var img=W.$(imgId);
    if(j.image){ img.src=j.image; img.style.display='block'; } else { img.style.display='none'; }
    W.$(titId).textContent=j.title||''; W.$(prcId).textContent=j.price?'R$ '+parseFloat(j.price).toLocaleString('pt-BR',{minimumFractionDigits:2}):'';
    W.$(pvId).classList.add('v');
    if(slot!=='M'){ var lbl=W.$('l'+slot); if(lbl&&!lbl.value&&j.store)lbl.value=j.store; }
  }).catch(function(){
    W.$(errId).textContent='Não foi possível processar o link.'; W.$(errId).classList.add('v');
  }).finally(function(){ btn.textContent='Buscar'; btn.disabled=false; });
}

function applyPrev(slot){
  var p=prev[slot]; if(!p) return;
  if(p.title&&!W.$('gTit').value) W.$('gTit').value=p.title;
  if(p.price&&!W.$('gVal').value) W.$('gVal').value=parseFloat(p.price)||'';
  if(p.image&&!gImgB64) W.$('gImg').value=p.image;
  W.$(slot==='M'?'pvM':'pv'+slot).classList.remove('v');
  if(slot==='M'){ gImgB64=null; W.$('gImgPreviewWrap').style.display='none'; }
  W.toast('Dados integrados! ✓');
}

W.$('fbM').addEventListener('click',function(){ doFetch(W.$('gImg').value.trim(),'M','fbM','pvM','peM','pvImgM','pvTM','pvPM'); });
W.$('buseM').addEventListener('click',function(){ applyPrev('M'); });
[1,2].forEach(function(n){
  W.$('fb'+n).addEventListener('click',function(){ doFetch(W.$('u'+n).value.trim(),n,'fb'+n,'pv'+n,'pe'+n,'pvImg'+n,'pvT'+n,'pvP'+n); });
  W.$('buse'+n).addEventListener('click',function(){ applyPrev(n); });
});

function processImageFile(f){
  if(!f||!f.type.match(/^image\//)) { W.toast('Utilize PNG, JPG ou WEBP.'); return; }
  var r=new FileReader();
  r.onload=function(ev){
    gImgB64=ev.target.result; gImgBg='#ffffff';
    W.$('gImgPreview').src=gImgB64;
    W.$('gImgPreviewWrap').style.display='block';
    W.$('dropArea').style.display='none';
    W.$('gImg').value=''; W.$('pvM').classList.remove('v');
  };
  r.readAsDataURL(f);
}

W.$('btnUploadImg').addEventListener('click',function(e){ e.stopPropagation(); W.$('gImgFile').click(); });
W.$('uploadZone').addEventListener('click',function(e){
  if(e.target===W.$('gImgClear')||e.target===W.$('btnUploadImg'))return;
  if(!gImgB64) W.$('gImgFile').click();
});
W.$('gImgFile').addEventListener('change',function(e){ processImageFile(e.target.files[0]); });

var zone=W.$('uploadZone');
zone.addEventListener('dragenter',function(e){ e.preventDefault(); e.stopPropagation(); zone.classList.add('drag-over'); });
zone.addEventListener('dragover',function(e){ e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect='copy'; zone.classList.add('drag-over'); });
zone.addEventListener('dragleave',function(e){ e.preventDefault(); e.stopPropagation(); if(!zone.contains(e.relatedTarget))zone.classList.remove('drag-over'); });
zone.addEventListener('drop',function(e){
  e.preventDefault(); e.stopPropagation(); zone.classList.remove('drag-over');
  var files=e.dataTransfer.files;
  if(files&&files.length>0){ processImageFile(files[0]); return; }
  var url=e.dataTransfer.getData('text/uri-list')||e.dataTransfer.getData('text/plain');
  if(url&&url.match(/^https?:\/\//)){
    W.$('gImg').value=url;
    W.toast('Link detectado! Clique em Mapear para carregar. 🔗');
  }
});

W.$('gImgClear').addEventListener('click',function(e){
  e.stopPropagation(); gImgB64=null; gImgBg='#ffffff';
  W.$('gImgPreview').src=''; W.$('gImgPreviewWrap').style.display='none';
  W.$('dropArea').style.display='block'; W.$('gImgFile').value='';
});

W.$('btnAddGift').addEventListener('click', function(){
  var type=document.querySelector('input[name="gt"]:checked').value;
  var title=W.$('gTit').value.trim();
  if(!title){ W.toast('Informe o título.'); return; }
  var imgSrc=gImgB64||W.$('gImg').value.trim();
  var g={
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    type:type, title:title,
    cat:W.$('gCat').value.trim(), desc:W.$('gDesc').value.trim(),
    img:imgSrc, imgBg:gImgBg,
    price:W.$('gVal').value
  };
  if(type==='url'){
    g.lbl1=W.$('l1').value.trim(); g.url1=W.$('u1').value.trim();
    g.lbl2=W.$('l2').value.trim(); g.url2=W.$('u2').value.trim();
  }
  if(type==='quota'){ g.qtot=parseInt(W.$('gQtot').value)||1; g.taken=0; }

  var addBtn=W.$('btnAddGift'), origTxt=addBtn.textContent;
  addBtn.disabled=true; addBtn.textContent='✓ Processando…'; addBtn.style.background='#444444';

  D.gifts.push(g);
  dbAddGift(g);
  renderGifts(); renderFilters(); renderAdminList();

  setTimeout(function(){
    ['gTit','gCat','gDesc','gImg','gVal','l1','u1','l2','u2','gQtot'].forEach(function(id){ var el=W.$(id); if(el)el.value=''; });
    ['pvM','pv1','pv2'].forEach(function(id){ var el=W.$(id); if(el)el.classList.remove('v'); });
    gImgB64=null; gImgBg='#ffffff';
    W.$('gImgPreviewWrap').style.display='none'; W.$('gImgPreview').src=''; W.$('gImgFile').value='';
    if(W.$('dropArea'))W.$('dropArea').style.display='block';
    var radios=document.querySelectorAll('input[name="gt"]'); if(radios.length)radios[0].checked=true;
    W.togType(); prev={};
    initPriceSlider();
    addBtn.disabled=false; addBtn.textContent=origTxt; addBtn.style.background='';
    W.toast('Item salvo com sucesso! 🎁',4000);
  },600);
});

function renderAdminList(){
  var el=W.$('aList');
  if(!D.gifts.length){ el.innerHTML='<p style="color:var(--text-muted);font-size:12px">Nenhum registro cadastrado.</p>'; return; }
  el.innerHTML=D.gifts.map(function(g){
    if(!g) return '';
    return '<div class="ai"><span>'+esc(g.title)+' <small style="color:var(--text-muted)">('+g.type+(g.cat?' · '+g.cat:'')+')</small></span>' +'<button class="bdel" data-did="'+g.id+'">Remover</button></div>';
  }).join('');
  el.querySelectorAll('.bdel').forEach(function(b){
    b.addEventListener('click', function(){
      if(!confirm('Remover este item?'))return;
      D.gifts=D.gifts.filter(function(g){ return g && g.id!==b.dataset.did; });
      dbDeleteGift(b.dataset.did);
      renderGifts(); renderFilters(); renderAdminList(); initPriceSlider();
    });
  });
}

W.$('btnSaveCfg').addEventListener('click', function(){
  var c=D.cfg;
  c.n1=W.$('cN1').value.trim(); c.n2=W.$('cN2').value.trim(); c.date=W.$('cDate').value;
  c.time=W.$('cTime').value.trim(); c.venue=W.$('cVenue').value.trim(); c.addr=W.$('cAddr').value.trim();
  c.mapUrl=W.$('cMap').value.trim(); c.dress=W.$('cDress').value.trim(); c.msg=W.$('cMsg').value.trim();
  c.spotifyUrl=W.$('cSpotify').value.trim()||c.spotifyUrl;
  var np=W.$('cPass').value; if(np)c.pass=np;
  dbSaveCfg();
  applyConfig(); startCD();
  W.toast('Configurações atualizadas! ✓');
});

W.$('fileIn').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){ setHeroPh(ev.target.result); savePh(ev.target.result); };
  r.readAsDataURL(f);
});
function setHeroPh(src){ var img=W.$('phImg'); img.src=src; img.style.display='block'; W.$('phPh').style.display='none'; }

function init(){
  try {
    var loader = document.getElementById('dbLoading');
    if(loader) loader.style.display = 'none';

    refreshAuthUI();
    applyConfig();
    
    var sGifts = W.$('sGifts');
    if(sGifts) {
      sGifts.querySelectorAll('[data-s]').forEach(function(b){
        b.addEventListener('click',function(){ W.setStatus(b.dataset.s,b); });
      });
    }
    var sortOrder = W.$('sortOrder');
    if(sortOrder) {
      sortOrder.addEventListener('change',function(){ gState.sort=this.value; renderGifts(); });
    }
    initPriceSlider();
    renderFilters(); renderGifts(); renderRSVPs(); startCD();

    var ph=loadPh(); if(ph)setHeroPh(ph);
    if(W.adm) W.$('btnAdm').textContent='Painel';
  } catch (err) {
    console.error("Erro inicializacao visual:", err);
    var loaderFallback = document.getElementById('dbLoading');
    if(loaderFallback) loaderFallback.style.display = 'none';
  }

  if(sb) {
    dbLoadAll().then(function(){
      try {
        applyConfig();
        initPriceSlider();
        renderFilters();
        renderGifts();
        renderRSVPs();
        startCD();
      } catch(e) {
        console.error("Erro ao aplicar dados assincronos:", e);
      }
    }).catch(function(e){
      console.error("Erro background load:", e);
    });
  }
}

init();
})();
</script>
</body>
